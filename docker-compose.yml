services:
  postgres:
    image: postgres:15-alpine
    container_name: cci-postgres
    environment:
      POSTGRES_DB: cci_protestos
      POSTGRES_USER: cci_user
      POSTGRES_PASSWORD: cci_password
    ports:
      - "5433:5432"
    volumes:
      - pgdata:/var/lib/postgresql/data
    healthcheck:
      test: ["CMD-SHELL", "pg_isready -U cci_user -d cci_protestos"]
      interval: 5s
      timeout: 5s
      retries: 10
      start_period: 5s

volumes:
  pgdata:
