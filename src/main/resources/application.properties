spring.application.name=cci-protestos-backend

spring.datasource.url=${DATABASE_URL:jdbc:postgresql://localhost:5433/cci_protestos}
spring.datasource.username=${DATABASE_USER:cci_user}
spring.datasource.password=${DATABASE_PASSWORD:cci_password}

spring.jpa.hibernate.ddl-auto=${JPA_DDL_AUTO:validate}
spring.jpa.open-in-view=false
spring.h2.console.enabled=false
spring.flyway.enabled=${FLYWAY_ENABLED:true}
spring.flyway.baseline-on-migrate=${FLYWAY_BASELINE_ON_MIGRATE:false}

spring.servlet.multipart.max-file-size=10MB
spring.servlet.multipart.max-request-size=10MB
server.error.include-message=${SERVER_ERROR_INCLUDE_MESSAGE:never}
server.forward-headers-strategy=framework

app.security.jwt.secret=${JWT_SECRET:desarrollo-local-cci-0123456789012345}
app.security.jwt.expiration-minutes=${JWT_EXPIRATION_MINUTES:60}
app.security.jwt.issuer=cci-protestos
app.security.cookie.name=CCI_ACCESS_TOKEN
app.security.cookie.secure=${COOKIE_SECURE:false}
app.security.cookie.same-site=${COOKIE_SAME_SITE:Strict}
app.cors.allowed-origin=${CORS_ALLOWED_ORIGIN:http://localhost:5173}
app.storage.location=${STORAGE_LOCATION:./storage}
app.storage.max-bytes=${STORAGE_MAX_BYTES:10485760}
app.data.demo-enabled=${APP_DEMO_DATA_ENABLED:false}
app.bootstrap.admin.email=${APP_BOOTSTRAP_ADMIN_EMAIL:}
app.bootstrap.admin.password=${APP_BOOTSTRAP_ADMIN_PASSWORD:}
app.bootstrap.admin.name=${APP_BOOTSTRAP_ADMIN_NAME:Administrador CCI}

management.endpoints.web.exposure.include=health
management.endpoint.health.probes.enabled=true
management.endpoint.health.show-details=never

springdoc.api-docs.enabled=${SPRINGDOC_API_DOCS_ENABLED:true}
springdoc.swagger-ui.enabled=${SPRINGDOC_SWAGGER_UI_ENABLED:true}
