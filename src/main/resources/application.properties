spring.application.name=cci-protestos-backend

spring.datasource.url=${DATABASE_URL:jdbc:h2:file:./data/cci_protestos;MODE=PostgreSQL;DATABASE_TO_LOWER=TRUE;DB_CLOSE_DELAY=-1}
spring.datasource.username=${DATABASE_USER:sa}
spring.datasource.password=${DATABASE_PASSWORD:}

spring.jpa.hibernate.ddl-auto=create
spring.jpa.open-in-view=false
spring.h2.console.enabled=true
spring.h2.console.path=/h2-console

spring.servlet.multipart.max-file-size=10MB
spring.servlet.multipart.max-request-size=10MB
server.error.include-message=always

app.security.jwt.secret=${JWT_SECRET:desarrollo-academico-0123456789012345}
app.security.jwt.expiration-minutes=${JWT_EXPIRATION_MINUTES:60}
app.security.jwt.issuer=cci-protestos
app.security.cookie.name=CCI_ACCESS_TOKEN
app.security.cookie.secure=false
app.cors.allowed-origin=${CORS_ALLOWED_ORIGIN:http://localhost:5173}
app.storage.location=${STORAGE_LOCATION:./storage}
app.storage.max-bytes=${STORAGE_MAX_BYTES:10485760}

springdoc.api-docs.enabled=true
springdoc.swagger-ui.enabled=true
