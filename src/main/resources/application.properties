spring.application.name=cci-protestos-backend
spring.datasource.url=${DATABASE_URL:jdbc:postgresql://localhost:5432/cci_protestos}
spring.datasource.username=${DATABASE_USER:postgres}
spring.datasource.password=${DATABASE_PASSWORD:postgres}
spring.jpa.hibernate.ddl-auto=validate
spring.jpa.open-in-view=false
spring.flyway.enabled=true
spring.servlet.multipart.max-file-size=10MB
spring.servlet.multipart.max-request-size=10MB
server.error.include-message=never
app.security.jwt.secret=${JWT_SECRET}
app.security.jwt.expiration-minutes=${JWT_EXPIRATION_MINUTES:60}
app.security.jwt.issuer=cci-protestos
app.cors.allowed-origin=${CORS_ALLOWED_ORIGIN:http://localhost:5173}
app.storage.location=${STORAGE_LOCATION:./storage}
app.storage.max-bytes=10485760
springdoc.swagger-ui.path=/swagger-ui.html
